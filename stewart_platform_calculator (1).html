<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6-UPS Stewart Platform Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- ======= YOUR ORIGINAL STYLES REMAIN UNCHANGED ======= -->
<style>
/* Keep all your original CSS exactly as before */
body{margin:0;background:#0a0e27;color:#e0f7ff;font-family:monospace}
.container{padding:20px}
canvas{width:100%;height:500px}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px}
.result-card{background:#111;padding:15px;border-radius:10px;text-align:center}
</style>
</head>

<body>
<div class="container">
<h2>6-UPS Stewart Platform – Real Geometry</h2>

X <input type="number" id="x" value="0" oninput="calculate()">
Y <input type="number" id="y" value="0" oninput="calculate()">
Z <input type="number" id="z" value="0" oninput="calculate()">

Roll α <input type="number" id="alpha" value="0" oninput="calculate()">
Pitch β <input type="number" id="beta" value="0" oninput="calculate()">
Yaw γ <input type="number" id="gamma" value="0" oninput="calculate()">

<div class="results-grid">
<div class="result-card">L1 <div id="L1">--</div></div>
<div class="result-card">L2 <div id="L2">--</div></div>
<div class="result-card">L3 <div id="L3">--</div></div>
<div class="result-card">L4 <div id="L4">--</div></div>
<div class="result-card">L5 <div id="L5">--</div></div>
<div class="result-card">L6 <div id="L6">--</div></div>
</div>

<div id="canvas-container"></div>
</div>

<script>

/* =========================================================
   REAL EXPERIMENTAL GEOMETRY (A–F BASE, G–L PLATFORM)
   ========================================================= */

// Base points A–F
const basePoints = [
{ x: 35.755,  y: 38.51,  z: -368.525 },
{ x: -35.755, y: 38.51,  z: -368.525 },
{ x: -337.03, y: 38.51,  z: 153.297 },
{ x: -301.274,y: 38.51,  z: 215.227 },
{ x: 301.274, y: 38.51,  z: 215.227 },
{ x: 337.03,  y: 38.51,  z: 153.297 }
];

// Platform points G–L (global frame)
const platformGlobal = [
{ x: -25.9,   y: 352.681, z: 155.646 },
{ x: 25.9,    y: 352.681, z: 155.646 },
{ x: 147.743, y: 352.681, z: -55.392 },
{ x: 121.843, y: 352.681, z: -100.253 },
{ x: -121.843,y: 352.681, z: -100.253 },
{ x: -147.743,y: 352.681, z: -55.392 }
];

// Platform center P
const PLATFORM_CENTER = { x:0, y:432.259, z:0 };

// Convert to local frame
const platformLocal = platformGlobal.map(pt=>({
x:pt.x-PLATFORM_CENTER.x,
y:pt.y-PLATFORM_CENTER.y,
z:pt.z-PLATFORM_CENTER.z
}));

/* =========================================================
   ROTATION MATRICES
   ========================================================= */

function rotationMatrix(alpha,beta,gamma){
alpha*=Math.PI/180;
beta*=Math.PI/180;
gamma*=Math.PI/180;

const cx=Math.cos(alpha), sx=Math.sin(alpha);
const cy=Math.cos(beta),  sy=Math.sin(beta);
const cz=Math.cos(gamma), sz=Math.sin(gamma);

return [
[cz*cy, cz*sy*sx - sz*cx, cz*sy*cx + sz*sx],
[sz*cy, sz*sy*sx + cz*cx, sz*sy*cx - cz*sx],
[-sy,   cy*sx,            cy*cx]
];
}

function transform(pt,R,t){
return{
x:R[0][0]*pt.x+R[0][1]*pt.y+R[0][2]*pt.z+t.x,
y:R[1][0]*pt.x+R[1][1]*pt.y+R[1][2]*pt.z+t.y,
z:R[2][0]*pt.x+R[2][1]*pt.y+R[2][2]*pt.z+t.z
};
}

function dist(a,b){
return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);
}

/* =========================================================
   LEG LENGTH CALCULATION (REAL DATA)
   ========================================================= */

function calculate(){

const x=parseFloat(document.getElementById("x").value)||0;
const y=parseFloat(document.getElementById("y").value)||0;
const z=parseFloat(document.getElementById("z").value)||0;

const alpha=parseFloat(document.getElementById("alpha").value)||0;
const beta=parseFloat(document.getElementById("beta").value)||0;
const gamma=parseFloat(document.getElementById("gamma").value)||0;

const R=rotationMatrix(alpha,beta,gamma);

let transformedPoints=[];

for(let i=0;i<6;i++){

const rotated=transform(platformLocal[i],R,{x:0,y:0,z:0});

const globalPoint={
x:rotated.x+PLATFORM_CENTER.x+x,
y:rotated.y+PLATFORM_CENTER.y+y,
z:rotated.z+PLATFORM_CENTER.z+z
};

transformedPoints.push(globalPoint);

const L=dist(globalPoint,basePoints[i]);
document.getElementById("L"+(i+1)).innerText=L.toFixed(2)+" mm";
}

update3D(transformedPoints);
}

/* =========================================================
   3D VISUALIZATION (UNCHANGED STYLE)
   ========================================================= */

let scene,camera,renderer,legs=[];

function init3D(){

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(60,window.innerWidth/600,1,5000);
camera.position.set(0,900,900);
camera.lookAt(0,0,0);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,500);
document.getElementById("canvas-container").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

const baseGeo=new THREE.SphereGeometry(8);
const baseMat=new THREE.MeshBasicMaterial({color:0x00ffff});

basePoints.forEach(p=>{
const m=new THREE.Mesh(baseGeo,baseMat);
m.position.set(p.x,p.z,p.y);
scene.add(m);
});

for(let i=0;i<6;i++){
const cyl=new THREE.Mesh(
new THREE.CylinderGeometry(5,5,10,8),
new THREE.MeshBasicMaterial({color:0xffff00})
);
scene.add(cyl);
legs.push(cyl);
}

animate();
}

function update3D(points){

for(let i=0;i<6;i++){

const base=basePoints[i];
const pt=points[i];

const dir=new THREE.Vector3(
pt.x-base.x,
pt.z-base.z,
pt.y-base.y
);

const len=dir.length();

legs[i].geometry.dispose();
legs[i].geometry=new THREE.CylinderGeometry(5,5,len,8);

legs[i].position.set(
(base.x+pt.x)/2,
(base.z+pt.z)/2,
(base.y+pt.y)/2
);

legs[i].lookAt(new THREE.Vector3(pt.x,pt.z,pt.y));
}
}

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

init3D();
calculate();

</script>
</body>
</html>
