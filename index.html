<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Stewart Platform Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0a0e27;color:white}
.container{padding:20px}
input{width:80px}
canvas{width:100%;height:500px}
.results{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
.card{background:#111;padding:15px;border-radius:8px;text-align:center}
</style>
</head>
<body>

<div class="container">
<h2>Real 6-UPS Stewart Platform</h2>

X <input type="number" id="x" value="0" oninput="calculate()">
Y <input type="number" id="y" value="0" oninput="calculate()">
Z <input type="number" id="z" value="0" oninput="calculate()">

α <input type="number" id="alpha" value="0" oninput="calculate()">
β <input type="number" id="beta" value="0" oninput="calculate()">
γ <input type="number" id="gamma" value="0" oninput="calculate()">

<div class="results">
<div class="card">L1: <span id="L1">--</span></div>
<div class="card">L2: <span id="L2">--</span></div>
<div class="card">L3: <span id="L3">--</span></div>
<div class="card">L4: <span id="L4">--</span></div>
<div class="card">L5: <span id="L5">--</span></div>
<div class="card">L6: <span id="L6">--</span></div>
</div>

<div id="canvas-container"></div>

</div>

<script>

// ===============================
// REAL EXPERIMENTAL GEOMETRY
// ===============================

// Base Points A–F
const basePoints = [
{ x: 35.755,  y: 38.51,  z: -368.525 },
{ x: -35.755, y: 38.51,  z: -368.525 },
{ x: -337.03, y: 38.51,  z: 153.297 },
{ x: -301.274,y: 38.51,  z: 215.227 },
{ x: 301.274, y: 38.51,  z: 215.227 },
{ x: 337.03,  y: 38.51,  z: 153.297 }
];

// Platform Points G–L (global)
const platformPoints = [
{ x: -25.9,   y: 352.681, z: 155.646 },
{ x: 25.9,    y: 352.681, z: 155.646 },
{ x: 147.743, y: 352.681, z: -55.392 },
{ x: 121.843, y: 352.681, z: -100.253 },
{ x: -121.843,y: 352.681, z: -100.253 },
{ x: -147.743,y: 352.681, z: -55.392 }
];

// Platform center P
const PLATFORM_CENTER = { x:0, y:432.259, z:0 };

// Convert to local coordinates
const platformLocal = platformPoints.map(pt => ({
x: pt.x - PLATFORM_CENTER.x,
y: pt.y - PLATFORM_CENTER.y,
z: pt.z - PLATFORM_CENTER.z
}));

// ===============================
// ROTATION MATRICES
// ===============================

function rotationMatrix(alpha,beta,gamma){
alpha*=Math.PI/180;
beta*=Math.PI/180;
gamma*=Math.PI/180;

const cx=Math.cos(alpha), sx=Math.sin(alpha);
const cy=Math.cos(beta),  sy=Math.sin(beta);
const cz=Math.cos(gamma), sz=Math.sin(gamma);

return [
[cz*cy, cz*sy*sx - sz*cx, cz*sy*cx + sz*sx],
[sz*cy, sz*sy*sx + cz*cx, sz*sy*cx - cz*sx],
[-sy,   cy*sx,            cy*cx]
];
}

function transform(point,R,t){
return {
x:R[0][0]*point.x + R[0][1]*point.y + R[0][2]*point.z + t.x,
y:R[1][0]*point.x + R[1][1]*point.y + R[1][2]*point.z + t.y,
z:R[2][0]*point.x + R[2][1]*point.y + R[2][2]*point.z + t.z
};
}

function distance(a,b){
return Math.sqrt(
(a.x-b.x)**2 +
(a.y-b.y)**2 +
(a.z-b.z)**2
);
}

// ===============================
// CALCULATION
// ===============================

function calculate(){

const x=parseFloat(document.getElementById("x").value)||0;
const y=parseFloat(document.getElementById("y").value)||0;
const z=parseFloat(document.getElementById("z").value)||0;

const alpha=parseFloat(document.getElementById("alpha").value)||0;
const beta=parseFloat(document.getElementById("beta").value)||0;
const gamma=parseFloat(document.getElementById("gamma").value)||0;

const R=rotationMatrix(alpha,beta,gamma);

for(let i=0;i<6;i++){

// rotate local platform point
const rotated=transform(platformLocal[i],R,{x:0,y:0,z:0});

// translate from center P
const globalPoint={
x:rotated.x + PLATFORM_CENTER.x + x,
y:rotated.y + PLATFORM_CENTER.y + y,
z:rotated.z + PLATFORM_CENTER.z + z
};

const L=distance(globalPoint,basePoints[i]);

document.getElementById("L"+(i+1)).innerText=L.toFixed(2)+" mm";
}

update3D(R,x,y,z);
}

// ===============================
// THREE JS VISUALIZATION
// ===============================

let scene,camera,renderer,platformMesh,legs=[];

function init3D(){

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(60,window.innerWidth/600,1,5000);
camera.position.set(0,800,800);
camera.lookAt(0,0,0);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,500);
document.getElementById("canvas-container").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

const baseGeo=new THREE.SphereGeometry(10);
const baseMat=new THREE.MeshBasicMaterial({color:0x00ffff});

basePoints.forEach(p=>{
const m=new THREE.Mesh(baseGeo,baseMat);
m.position.set(p.x,p.z,p.y);
scene.add(m);
});

platformMesh=new THREE.Group();
scene.add(platformMesh);

for(let i=0;i<6;i++){
const cyl=new THREE.Mesh(
new THREE.CylinderGeometry(5,5,10,8),
new THREE.MeshBasicMaterial({color:0xffff00})
);
scene.add(cyl);
legs.push(cyl);
}

animate();
}

function update3D(R,x,y,z){

platformMesh.position.set(
PLATFORM_CENTER.x + x,
PLATFORM_CENTER.z + z,
PLATFORM_CENTER.y + y
);

for(let i=0;i<6;i++){

const rotated=transform(platformLocal[i],R,{x:0,y:0,z:0});
const pt={
x:rotated.x + PLATFORM_CENTER.x + x,
y:rotated.y + PLATFORM_CENTER.y + y,
z:rotated.z + PLATFORM_CENTER.z + z
};

const base=basePoints[i];

const dir=new THREE.Vector3(
pt.x-base.x,
pt.z-base.z,
pt.y-base.y
);

const len=dir.length();

legs[i].geometry.dispose();
legs[i].geometry=new THREE.CylinderGeometry(5,5,len,8);

legs[i].position.set(
(base.x+pt.x)/2,
(base.z+pt.z)/2,
(base.y+pt.y)/2
);

legs[i].lookAt(new THREE.Vector3(pt.x,pt.z,pt.y));
}
}

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

init3D();
calculate();

</script>
</body>
</html>
